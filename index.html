<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrailSense</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="planner-panel" aria-labelledby="planner-title">
        <div class="brand-row">
          <div>
            <p class="eyebrow">TrailSense</p>
            <h1 id="planner-title">Plan a constraint-aware trip</h1>
          </div>
          <div class="profile-indicator" id="profile-indicator">No profile selected</div>
        </div>

        <section class="auth-card" aria-labelledby="account-title">
          <div class="auth-heading">
            <div>
              <p class="eyebrow">Account</p>
              <h2 id="account-title">Save trips locally</h2>
            </div>
            <button type="button" class="secondary-button compact-button" id="logout-button">Log out</button>
          </div>
          <div class="auth-grid" id="auth-grid">
            <label>
              Email
              <input id="auth-email" type="email" autocomplete="email" placeholder="traveler@example.com">
            </label>
            <label>
              Password
              <input id="auth-password" type="password" autocomplete="current-password" placeholder="8+ characters">
            </label>
          </div>
          <div class="action-row">
            <button type="button" class="secondary-button" id="login-button">Log in</button>
            <button type="button" class="secondary-button" id="register-button">Create account</button>
          </div>
          <p class="auth-status" id="auth-status">Open through the local server to enable account saving.</p>
          <div class="saved-trips" id="saved-trips"></div>
        </section>

        <form id="trip-form" class="trip-form">
          <div class="field-grid">
            <label>
              Origin
              <input id="origin" name="origin" type="text" autocomplete="off" required placeholder="Bengaluru">
            </label>
            <label>
              Destination
              <input id="destination" name="destination" type="text" autocomplete="off" required placeholder="Sikkim and Darjeeling">
            </label>
            <label>
              Start date
              <input id="startDate" name="startDate" type="date" required>
            </label>
            <label>
              End date
              <input id="endDate" name="endDate" type="date" required>
            </label>
            <label>
              Group size
              <input id="groupSize" name="groupSize" type="number" min="1" step="1" required value="2">
            </label>
          </div>

          <fieldset class="pace-field">
            <legend>Pace</legend>
            <div class="segmented-control">
              <label><input type="radio" name="pace" value="relaxed">Relaxed</label>
              <label><input type="radio" name="pace" value="mixed" checked>Mixed</label>
              <label><input type="radio" name="pace" value="adventure-heavy">Adventure-heavy</label>
            </div>
          </fieldset>

          <label class="notes-field">
            Notes
            <textarea id="notes" name="notes" rows="4" placeholder="Altitude sensitivity, mobility concerns, traveling with children or elderly travelers"></textarea>
          </label>

          <div id="form-errors" class="form-errors" role="alert"></div>

          <div class="action-row">
            <button type="submit" class="primary-button">Generate itinerary</button>
            <button type="button" class="secondary-button" id="demo-mountain">Mountain demo</button>
            <button type="button" class="secondary-button" id="demo-coastal">Coastal demo</button>
          </div>
        </form>
      </section>

      <section id="itinerary-panel" class="itinerary-panel empty-state" aria-live="polite">
        <div class="empty-copy">
          <p class="eyebrow">Itinerary</p>
          <h2>Trip checks will appear here.</h2>
        </div>
      </section>
    </main>

    <script src="src/data.js"></script>
    <script src="src/engine.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
